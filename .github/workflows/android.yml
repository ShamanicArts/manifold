name: Android Build

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a]
        api: [24]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r26b

      - name: Setup Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_HOME }}/ndk/26.1.10909125
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.api }} \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja \
            -DMANIFOLD_BUILD_LUA=ON \
            -DMANIFOLD_PLATFORM_ANDROID=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build-android --target ManifoldMobile -j$(nproc)

      - name: Package APK
        run: |
          cd build-android
          cmake --build . --target apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manifold-android-${{ matrix.abi }}-api${{ matrix.api }}
          path: build-android/ManifoldMobile_artefacts/Release/*.apk
          retention-days: 30

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: manifold-android-symbols-${{ matrix.abi }}
          path: build-android/ManifoldMobile_artefacts/Release/**/*.so
          retention-days: 30
